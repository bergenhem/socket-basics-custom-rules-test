name: ⚡️ Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  security-scan:
    permissions:
      issues: write
      contents: read
      pull-requests: write
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: ctions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Socket Security Scan
        uses: SocketDev/socket-basics@933940968bf73a35a63d5594e78a27d0b2a8c2d3
        with:
          use_custom_sast_rules: 'true'
          custom_sast_rule_path: '.socket/rules'
